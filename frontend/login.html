<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AngroAndina Monitor — Iniciar sesión</title>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px 16px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand img { height: 36px; }
    .login-brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
    }

    .login-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .login-field { margin-bottom: 16px; }
    .login-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .login-input:focus { border-color: var(--green); }
    .login-input::placeholder { color: var(--muted); }

    .login-error {
      font-size: 13px;
      color: #fb7185;
      background: #fb718512;
      border: 1px solid #fb718530;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .login-btn {
      width: 100%;
      background: var(--green);
      color: #0a0f0a;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spin {
      animation: spin-anim 0.7s linear infinite;
    }
    @keyframes spin-anim {
      to { transform: rotate(360deg); }
    }

    .login-footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <img src="assets/logo.svg" alt="AngroAndina Monitor" />
  </div>

  <div class="login-card">

    <!-- Vista: sign-in -->
    <div id="view-signin">
      <h1 class="login-title">Iniciar sesión</h1>
      <p class="login-hint">Ingresa con las credenciales enviadas por el administrador.</p>

      <form id="form-signin" novalidate>
        <div class="login-field">
          <label class="login-label" for="email">Correo electrónico</label>
          <input class="login-input" id="email" type="email"
                 autocomplete="email" placeholder="nombre@ejemplo.com" required />
        </div>
        <div class="login-field">
          <label class="login-label" for="password">Contraseña</label>
          <input class="login-input" id="password" type="password"
                 autocomplete="current-password" placeholder="••••••••" required />
        </div>

        <div class="login-error" id="error-signin" hidden></div>

        <button class="login-btn" id="btn-signin" type="submit">
          <span class="btn-label">Ingresar</span>
          <span class="btn-spinner" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" class="spin">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83
                       M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>
    </div>

    <!-- Vista: nueva contraseña (primer login) -->
    <div id="view-newpass" hidden>
      <h1 class="login-title">Elige tu contraseña</h1>
      <p class="login-hint">Es tu primer acceso. Crea una contraseña nueva para continuar.</p>

      <form id="form-newpass" novalidate>
        <div class="login-field">
          <label class="login-label" for="new-password">Nueva contraseña</label>
          <input class="login-input" id="new-password" type="password"
                 autocomplete="new-password" placeholder="Mínimo 8 caracteres" required />
        </div>
        <div class="login-field">
          <label class="login-label" for="confirm-password">Confirmar contraseña</label>
          <input class="login-input" id="confirm-password" type="password"
                 autocomplete="new-password" placeholder="Repite tu contraseña" required />
        </div>

        <div class="login-error" id="error-newpass" hidden></div>

        <button class="login-btn" id="btn-newpass" type="submit">
          <span class="btn-label">Guardar y continuar</span>
          <span class="btn-spinner" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" class="spin">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83
                       M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>
    </div>

  </div>

  <p class="login-footer">© AngroAndina Fresh S.A.C. · Acceso restringido</p>
</div>

<script type="module">
  import { signIn, completeNewPassword, getSession } from './js/auth.js';

  if (getSession()) window.location.replace('/');

  let challengeState = null;

  function showView(name) {
    document.getElementById('view-signin').hidden  = name !== 'signin';
    document.getElementById('view-newpass').hidden = name !== 'newpass';
  }

  function setLoading(btnId, loading) {
    const btn    = document.getElementById(btnId);
    btn.disabled = loading;
    btn.querySelector('.btn-label').hidden   = loading;
    btn.querySelector('.btn-spinner').hidden = !loading;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.hidden = false;
  }

  function clearErrors() {
    ['error-signin', 'error-newpass'].forEach(id => {
      const el = document.getElementById(id);
      el.hidden = true;
      el.textContent = '';
    });
  }

  document.querySelectorAll('.login-input').forEach(i => i.addEventListener('input', clearErrors));

  document.getElementById('form-signin').addEventListener('submit', async e => {
    e.preventDefault();
    clearErrors();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('error-signin', 'Completa todos los campos.'); return; }
    setLoading('btn-signin', true);
    try {
      const result = await signIn(email, password);
      if (result.challenge === 'NEW_PASSWORD_REQUIRED') {
        challengeState = { session: result.session, email: result.email };
        showView('newpass');
      } else {
        window.location.replace('/');
      }
    } catch (err) {
      showError('error-signin', friendlyError(err.message));
    } finally {
      setLoading('btn-signin', false);
    }
  });

  document.getElementById('form-newpass').addEventListener('submit', async e => {
    e.preventDefault();
    clearErrors();
    const newPass  = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;
    if (!newPass || !confirm) { showError('error-newpass', 'Completa todos los campos.'); return; }
    if (newPass !== confirm)  { showError('error-newpass', 'Las contraseñas no coinciden.'); return; }
    if (newPass.length < 8)   { showError('error-newpass', 'Mínimo 8 caracteres.'); return; }
    setLoading('btn-newpass', true);
    try {
      await completeNewPassword(challengeState.email, challengeState.session, newPass);
      window.location.replace('/');
    } catch (err) {
      showError('error-newpass', friendlyError(err.message));
    } finally {
      setLoading('btn-newpass', false);
    }
  });

  function friendlyError(msg) {
    if (!msg) return 'Error inesperado. Intenta de nuevo.';
    const m = msg.toLowerCase();
    if (m.includes('notauthorized') || m.includes('incorrect')) return 'Correo o contraseña incorrectos.';
    if (m.includes('usernotfound'))      return 'No existe una cuenta con ese correo.';
    if (m.includes('toomanyrequests') || m.includes('limitexceeded')) return 'Demasiados intentos. Espera unos minutos.';
    if (m.includes('password'))          return 'La contraseña no cumple los requisitos de seguridad.';
    return msg;
  }
</script>
</body>
</html>
