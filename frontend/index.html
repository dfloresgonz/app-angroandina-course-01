<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroAndina Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <img src="assets/logo.svg" alt="AgroAndina" class="logo" />
    </div>
    <div class="header-right">
      <span class="live-dot"></span>
      <span class="live-label">LIVE</span>
      <span class="header-sep">|</span>
      <span class="header-user" id="header-user"></span>
      <span class="header-email" id="header-email"></span>
      <button class="header-logout" id="btn-logout" title="Cerrar sesión">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="legend" id="legend"></div>
    <div class="grid">
      <div class="card">
        <h2>Temperatura (°C)</h2>
        <canvas id="chart-temperature"></canvas>
      </div>
      <div class="card">
        <h2>Humedad Actual (%)</h2>
        <canvas id="chart-humidity"></canvas>
      </div>
      <div class="card">
        <h2>Humedad del Suelo (%)</h2>
        <canvas id="chart-soil"></canvas>
      </div>
      <div class="card">
        <h2>Intensidad Lumínica (lux)</h2>
        <canvas id="chart-light"></canvas>
      </div>
      <div class="card">
        <h2>Velocidad del Viento (km/h)</h2>
        <canvas id="chart-wind"></canvas>
      </div>
      <div class="card">
        <h2>Nivel de Batería (%)</h2>
        <canvas id="chart-battery"></canvas>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
