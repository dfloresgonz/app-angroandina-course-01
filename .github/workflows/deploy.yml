name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VAR_project_name: angroandina-monitor
  TF_VAR_environment: dev
  TF_VAR_kdg_username: ${{ secrets.KDG_USERNAME }}
  TF_VAR_kdg_password: ${{ secrets.KDG_PASSWORD }}
  # GCP Terraform vars
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_region: us-central1
  # AWS Terraform vars (GCP references)
  TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_gcp_pubsub_topic: angroandina-monitor-telemetry

jobs:
  deploy:
    name: Deploy angroandina-monitor
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. AWS credentials ─────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. GCP credentials ─────────────────────────────────────────────────
      - name: Configure GCP credentials
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 4. Tooling ─────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # ── 5. Bootstrap remote state (idempotente) ────────────────────────────
      - name: Bootstrap Terraform state backends
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          STATE_BUCKET="angroandina-monitor-tfstate-dev"

          # S3
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$STATE_BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-tagging \
              --bucket "$STATE_BUCKET" \
              --tagging 'TagSet=[{Key=ProjectName,Value=angroandina-monitor},{Key=Environment,Value=dev},{Key=ManagedBy,Value=terraform},{Key=Owner,Value=grupo1-prog-multinube}]'
          fi

          # DynamoDB lock
          if ! aws dynamodb describe-table --table-name angroandina-tfstate-lock-dev \
               --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name angroandina-tfstate-lock-dev \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION" \
              --tags Key=ProjectName,Value=angroandina-monitor Key=Environment,Value=dev Key=ManagedBy,Value=terraform Key=Owner,Value=grupo1-prog-multinube
          fi

          # GCS
          if ! gcloud storage buckets describe "gs://$STATE_BUCKET" >/dev/null 2>&1; then
            gcloud storage buckets create "gs://$STATE_BUCKET" \
              --project="$GCP_PROJECT_ID" \
              --location=US \
              --uniform-bucket-level-access
            gcloud storage buckets update "gs://$STATE_BUCKET" \
              --update-labels=project_name=angroandina-monitor,environment=dev,managed_by=terraform,owner=grupo1-prog-multinube
          fi

      # ── 6. Zip Lambdas ─────────────────────────────────────────────────────
      - name: Zip Lambda functions
        run: |
          mkdir -p .lambda-zips
          for fn in ws-handler data-processor gcp-forwarder; do
            cd app/lambdas/$fn
            if [ -f package.json ]; then
              npm ci --omit=dev --silent
            fi
            zip -qr ../../../.lambda-zips/$fn.zip . \
              --exclude "*.test.*" "*.spec.*" ".DS_Store"
            cd ../../..
            echo "✓ $fn.zip"
          done

      # ── 7. Deploy GCP ──────────────────────────────────────────────────────
      - name: Terraform init — GCP
        working-directory: infrastructure/gcp
        run: terraform init -input=false

      - name: Terraform apply — GCP
        id: gcp
        working-directory: infrastructure/gcp
        run: |
          terraform apply -auto-approve -input=false
          echo "function_url=$(terraform output -raw function_url)" >> $GITHUB_OUTPUT

      # ── 8. Store GCP SA key in Secrets Manager ────────────────────────────
      - name: Store GCP SA key in Secrets Manager
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          SECRET_NAME="angroandina-monitor/gcp-sa-key"
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$GCP_SA_KEY"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --secret-string "$GCP_SA_KEY" \
              --tags Key=ProjectName,Value=angroandina-monitor Key=Environment,Value=dev Key=ManagedBy,Value=terraform Key=Owner,Value=grupo1-prog-multinube
          fi

      # ── 9. Deploy AWS ──────────────────────────────────────────────────────
      - name: Terraform init — AWS
        working-directory: infrastructure/aws
        run: terraform init -input=false -upgrade

      - name: Terraform apply — AWS
        id: aws
        working-directory: infrastructure/aws
        run: |
          terraform apply -auto-approve -input=false

          echo "cloudfront_url=$(terraform output -raw cloudfront_url)"        >> $GITHUB_OUTPUT
          echo "ws_endpoint=$(terraform output -raw ws_endpoint)"              >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw distribution_id)"      >> $GITHUB_OUTPUT
          echo "pool_id=$(terraform output -raw cognito_user_pool_id)"         >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw cognito_client_id)"          >> $GITHUB_OUTPUT
          echo "kdg_url=$(terraform output -raw kdg_url)"                      >> $GITHUB_OUTPUT

      # ── 10. Frontend config ────────────────────────────────────────────────
      - name: Generate frontend/js/config.js
        run: |
          cat > frontend/js/config.js <<EOF
          window.AGRO_CONFIG = {
            wsUrl:      '${{ steps.aws.outputs.ws_endpoint }}',
            userPoolId: '${{ steps.aws.outputs.pool_id }}',
            clientId:   '${{ steps.aws.outputs.client_id }}'
          };
          EOF

      # ── 11. Sync frontend → S3 ─────────────────────────────────────────────
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.aws.outputs.frontend_bucket }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.DS_Store"

      # ── 12. Invalidar CloudFront ───────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.aws.outputs.distribution_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text

      # ── 13. Job summary ────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ Deploy completo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ steps.aws.outputs.cloudfront_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebSocket | ${{ steps.aws.outputs.ws_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KDG | ${{ steps.aws.outputs.kdg_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP Function | ${{ steps.gcp.outputs.function_url }} |" >> $GITHUB_STEP_SUMMARY
